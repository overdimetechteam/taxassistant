services:
  - type: web
    name: tax-advisor
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: cd app && gunicorn main:app --bind 0.0.0.0:$PORT --workers 2
    plan: free
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: QDRANT_CLUSTER_ENDPOINT
        sync: false
      - key: QDRANT_COLLECTION_NAME
        value: tax_acts
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: EMBEDDING_MODEL
        value: models/gemini-embedding-001
      - key: CHUNK_SIZE
        value: "1024"
      - key: CHUNK_OVERLAP
        value: "200"
      - key: ACTS_FOLDER
        value: ./Acts
